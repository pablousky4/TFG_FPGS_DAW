<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reserva Completada</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      background-color: #f8f9fa; 
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px; /* Añadido para un mejor padding en dispositivos pequeños */
    }

    h1 {
      color: green !important;
    }

    .spinner {
      animation: spin 1s infinite linear;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Media queries */
    @media (max-width: 768px) {
      body {
        height: auto; /* Ajusta la altura para dispositivos móviles */
        padding: 40px 20px; /* Añade más padding en dispositivos móviles */
      }

      h1 {
        font-size: 1.5rem; /* Ajusta el tamaño de la fuente para dispositivos móviles */
      }

      .spinner-border {
        width: 3rem;
        height: 3rem;
      }
    }

    @media (max-width: 576px) {
      h1 {
        font-size: 1.25rem; /* Ajusta el tamaño de la fuente para dispositivos extra pequeños */
      }

      .spinner-border {
        width: 2.5rem;
        height: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container text-center">
    <h1>Reserva Completada con Éxito</h1>&nbsp;&nbsp;
    <p>Redirigiendo...</p><br>
    <div class="spinner-border text-primary spinner" role="status">
      <span class="sr-only">Cargando...</span>
    </div>
  </div>

  <script>
    setTimeout(function() {
      window.location.href = 'index.html';
    }, 3000);
  </script>
</body>
</html>
