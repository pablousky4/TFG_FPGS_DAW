<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="shortcut icon" href="https://i.postimg.cc/CKgwQCZM/prtuebackxw.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .shadow {
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15); /* Sombra */
            padding: 30px;
        }

        /* Media queries */
        @media (max-width: 992px) {
            .col-lg-3, .col-lg-9 {
                flex: 0 0 100%;
                max-width: 100%;
            }

            .col-lg-3 {
                height: 200px;
            }

            .col-lg-9 {
                padding: 20px;
            }
        }

        @media (max-width: 768px) {
            .shadow {
                padding: 20px;
            }

            .p-6 {
                padding: 20px !important;
            }

            .lg\:p-12 {
                padding: 30px !important;
            }
        }

        @media (max-width: 576px) {
            .shadow {
                padding: 15px;
            }

            .p-6 {
                padding: 15px !important;
            }

            .lg\:p-12 {
                padding: 20px !important;
            }
        }
    </style>
</head>

<body class="font-inter">
    <div class="container-fluid">
        <div class="row vh-100">
            <div class="col-lg-3 bg-primary d-flex align-items-center justify-content-center shadow"> 
               <a href="index.html"><img src="https://i.postimg.cc/mrdLtwWg/Sin-t-tulo.png" alt="Logo" class="img-fluid"></a>
            </div>
            <div class="col-lg-9 d-flex align-items-center justify-content-center p-6 lg:p-12">
                <div class="w-full max-w-md border rounded shadow p-6"> 
                    <div class="text-center">
                        <h1 class="text-3xl font-bold">Crear Cuenta</h1>
                        <p class="text-gray-500 dark:text-gray-400">
                            ¿Ya tienes cuenta? <a href="login.html" class="underline">Accede aquí</a>
                        </p>
                    </div>
                    <form class="space-y-4">
                        <div class="row">
                            <div class="col-md-6">
                                <label for="name" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="name" placeholder="Pablo" required>
                            </div>
                            <div class="col-md-6">
                                <label for="surnames" class="form-label">Apellidos</label>
                                <input type="text" class="form-control" id="surnames" placeholder="Castro" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <label for="email" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="email" placeholder="Pablo@AnyRent.com" required>
                            </div>
                            <div class="col-md-6">
                                <label for="confirm-email" class="form-label">Confirmar E-Mail</label>
                                <input type="email" class="form-control" id="confirm-email" placeholder="Confirmar E-Mail" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <label for="Teléfono" class="form-label">Teléfono</label>
                                <input type="text" class="form-control" id="Teléfono" placeholder="Pablo@AnyRent.com" required>
                            </div>
                            <div class="col-md-6">
                                <label for="dni" class="form-label">Número de Documento</label>
                                <input type="text" class="form-control" id="dni" placeholder="12345678A" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
                            </div>
                            <div class="col-md-6">
                                <label for="confirm-password" class="form-label">Confirmar Contraseña</label>
                                <input type="password" class="form-control" id="confirm-password" placeholder="Confirmar Contraseña" required><br>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Registrarse</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
