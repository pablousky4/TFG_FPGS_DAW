<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasarela de Pago</title>
  <link rel="shortcut icon" href="https://i.postimg.cc/CKgwQCZM/prtuebackxw.png">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      background-color: #f8f9fa;
    }
    .payment-form {
      max-width: 400px;
      margin: 50px auto;
      padding: 30px;
      background-color: #fff;
      border-radius: 5px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
    }
    .form-group label {
      font-weight: 500;
    }
    .form-control {
      border-radius: 3px;
    }
    .btn-pay {
      background-color: #007bff;
      border-color: #007bff;
    }
    .circle-icon {
      position: absolute;
      top: 20px;
      left: 20px;
    }
    @media (max-width: 768px) {
      .payment-form {
        margin: 30px auto;
        padding: 20px;
      }
      .circle-icon {
        top: 10px;
        left: 10px;
      }
    }
    @media (max-width: 576px) {
      .payment-form {
        margin: 20px auto;
        padding: 15px;
      }
      h2 {
        font-size: 1.5rem;
      }
      .circle-icon {
        top: 5px;
        left: 5px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="row">
    <div class="col-md-12">
      <form class="payment-form" action="correcto.html">
        <h2 class="text-center mb-4">Detalles del pago</h2>
        <div class="form-group">
          <label for="card-number">Número de tarjeta</label>
          <input type="text" class="form-control" id="card-number" placeholder="Número de tarjeta" required>
        </div>
        <div class="form-group">
          <label for="expiry">Fecha de expiración</label>
          <input type="month" class="form-control" id="month-year" name="month-year" required>
        </div>
        <div class="form-group">
          <label for="cvv">CVV</label>
          <input type="text" class="form-control" id="cvv" placeholder="CVV" required>
        </div>
        <div class="form-group">
          <label for="name">Nombre en la tarjeta</label>
          <input type="text" class="form-control" id="name" placeholder="Nombre en la tarjeta" required>
        </div>
        <button type="submit" class="btn btn-primary btn-pay btn-block">Reservar</button>
      </form>
    </div>
    <div class="circle-icon">
      <a href="escaparate.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-chevron-left">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
        <span>Volver</span>
      </a>
    </div>
  </div>
</div>

</body>
</html>
