<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peluquería Invictus</title>
  <link rel="shortcut icon" href="https://i.postimg.cc/CKgwQCZM/prtuebackxw.png">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    .font-cursive {
      font-family: 'Brush Script MT', cursive;
    }
    .amarillo {
      color: yellow;
      font-weight: bold;
    }
    .circle-icon {
      width: 40px;
      height: 40px;
      background-color: #007BFF;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0px 0px 10px 0px rgba(0,0,0,0.75); 
    }
    .circle-icon svg {
      color: white;
    }
    #reservar {
      margin-top: 25px !important;
    }
    .numero {
      font-weight: bold;
    }
    #modular-panel {
      box-shadow: 0px 0px 20px 0px rgba(0,0,0,0.3); 
    }

    /* Media Queries */
    @media (max-width: 768px) {
      .payment-form {
        margin: 30px auto;
        padding: 20px;
      }
      .circle-icon {
        top: 10px;
        left: 10px;
      }
    }
    @media (max-width: 576px) {
      .payment-form {
        margin: 20px auto;
        padding: 15px;
      }
      h1 {
        font-size: 1.5rem;
      }
      .circle-icon {
        top: 5px;
        left: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="circle-icon" style="position:relative">
      <a href="index.html">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-chevron-left">
        <path d="M15 18l-6-6 6-6"></path>
      </svg></a>
    </div>
    <div class="row justify-content-center">
      <div class="col-md-6 mb-4">
        <div class="bg-white p-4 rounded-lg shadow-md" id="modular-panel">
          <h1 class="text-center text-4xl font-cursive" id="titulo">Peluquería Invictus</h1>
          <form action="pago.html">
            <label class="numero">#1</label>
            <div class="form-group cambiar">
              <label for="nombre">Nombre</label>
              <input type="text" class="form-control" id="nombre" placeholder="Nombre" required>
              <br>
              <label for="apellidos">Apellidos</label>
              <input type="text" class="form-control" id="apellidos" placeholder="Apellidos" required>
            </div>
            <label class="numero">#2</label>
            <div class="form-group cambiar">
              <label for="time">Fecha y hora</label>
              <input type="datetime-local" class="form-control" required>
            </div>
            <label class="numero">#3</label>
            <div class="form-group cambiar">
              <a href="pago.html">
              <img src="https://i.postimg.cc/MpL2R7wK/Master-Card-Logo-svg.png" alt="MasterCard" class="img-fluid mr-2" style="height: 40px;">
              <img src="https://i.postimg.cc/tC2HR0m6/2560px-Apple-Pay-logo-svg.png" alt="Apple Pay" class="img-fluid mr-2" style="height: 40px;">
              <img src="https://i.postimg.cc/y8ttW7hD/Paypal-2014-logo.png" alt="PayPal" class="img-fluid mr-2" style="height: 40px;"></a>
            </div>
            
            <button id="reservar" type="submit" class="btn btn-primary btn-block mt-3">Reservar</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  
 <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
